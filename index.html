<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JUNGLE STRIKE COMMANDO</title>
<style>
  html,body{margin:0;padding:0;background:#0b1006;height:100%;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    touch-action:none;-webkit-user-select:none;user-select:none;}
  #wrap{position:relative;}
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;
    background:#0b1006;box-shadow:0 0 60px rgba(60,255,120,.12);}
  #hint{position:absolute;left:0;right:0;bottom:-26px;text-align:center;
    font:11px monospace;color:#4d7a45;letter-spacing:2px;}
  /* ---- touch controls (shown only on touch devices) ---- */
  .tc{display:none;position:fixed;z-index:10;-webkit-tap-highlight-color:transparent;}
  body.touch .tc{display:block;}
  body.touch #hint{display:none;}
  #pad{left:18px;bottom:18px;width:150px;height:150px;border-radius:50%;
    background:rgba(40,70,30,.35);border:2px solid rgba(154,255,96,.4);}
  #padStick{position:absolute;left:50%;top:50%;width:56px;height:56px;margin:-28px 0 0 -28px;
    border-radius:50%;background:rgba(154,255,96,.45);pointer-events:none;}
  .btn{width:84px;height:84px;border-radius:50%;
    font:bold 15px monospace;color:#e8ffe0;text-align:center;line-height:84px;
    border:2px solid rgba(255,217,138,.5);}
  #btnFire{right:18px;bottom:64px;background:rgba(180,60,40,.4);}
  #btnJump{right:118px;bottom:14px;background:rgba(60,100,170,.4);}
  .btn.on{filter:brightness(1.8);}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv" width="960" height="540"></canvas>
  <div id="hint">ARROWS MOVE/AIM &nbsp;·&nbsp; Z JUMP &nbsp;·&nbsp; X FIRE &nbsp;·&nbsp; ENTER START</div>
</div>
<div id="pad" class="tc"><div id="padStick"></div></div>
<div id="btnJump" class="tc btn">JUMP</div>
<div id="btnFire" class="tc btn">FIRE</div>
<script>
"use strict";
/* =========================================================
   JUNGLE STRIKE COMMANDO — single-file run-and-gun
   All art is original geometric pixel work drawn with rects.
   ========================================================= */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = 960, H = 540;
const GROUND_Y = 460;           // default ground top
const LEVEL_W = 6900;           // world width
const GRAV = 0.55;

/* ---------------- audio (Web Audio API) ---------------- */
let AC = null;
function ac(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function tone(freq, dur, type, vol, slideTo){
  const a = ac(); if(!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type||'square'; o.frequency.setValueAtTime(freq, a.currentTime);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo), a.currentTime+dur);
  g.gain.setValueAtTime(vol||0.12, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+dur);
  o.connect(g); g.connect(a.destination);
  o.start(); o.stop(a.currentTime+dur+0.02);
}
function noiseBurst(dur, vol, low){
  const a = ac(); if(!a) return;
  const len = Math.floor(a.sampleRate*dur);
  const buf = a.createBuffer(1, len, a.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*(1-i/len);
  const src = a.createBufferSource(); src.buffer = buf;
  const f = a.createBiquadFilter(); f.type='lowpass'; f.frequency.value = low||1200;
  const g = a.createGain(); g.gain.value = vol||0.2;
  src.connect(f); f.connect(g); g.connect(a.destination); src.start();
}
const SFX = {
  shoot(){ tone(880, .07, 'square', .07, 220); },
  spread(){ tone(660, .09, 'square', .08, 180); },
  laser(){ tone(1400, .12, 'sawtooth', .07, 300); },
  eshoot(){ tone(330, .08, 'square', .05, 110); },
  jump(){ tone(220, .12, 'square', .08, 520); },
  boom(){ noiseBurst(.3, .25, 900); tone(110, .25, 'triangle', .15, 40); },
  bigboom(){ noiseBurst(.6, .3, 600); tone(80, .5, 'triangle', .2, 30); },
  hitB(){ tone(180, .06, 'square', .1, 90); },
  power(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,.1,'square',.1),i*70)); },
  die(){ tone(440,.5,'sawtooth',.12,55); noiseBurst(.35,.2,800); },
  win(){ [523,659,784,1046,784,1046,1318].forEach((f,i)=>setTimeout(()=>tone(f,.16,'square',.1),i*130)); },
  over(){ [392,330,262,196].forEach((f,i)=>setTimeout(()=>tone(f,.25,'triangle',.12),i*220)); }
};

/* ---------------- input ---------------- */
const keys = {};
const KMAP = {ArrowLeft:'L',ArrowRight:'R',ArrowUp:'U',ArrowDown:'D',KeyZ:'J',KeyX:'F',Enter:'GO',KeyR:'GO'};
addEventListener('keydown', e=>{
  const k = KMAP[e.code]; if(!k) return;
  e.preventDefault();
  ac(); // unlock audio on first input
  if(!keys[k]) keys[k+'_p'] = true; // pressed-this-frame
  keys[k] = true;
});
addEventListener('keyup', e=>{ const k = KMAP[e.code]; if(k){ e.preventDefault(); keys[k]=false; } });
function clearPresses(){ for(const k in keys) if(k.endsWith('_p')) keys[k]=false; }

/* ---------------- responsive scaling ---------------- */
function fit(){
  const isTouch = document.body.classList.contains('touch');
  const pad = isTouch ? 0 : 40;
  const s = Math.min((innerWidth-pad)/W, (innerHeight-pad)/H);
  cv.style.width  = Math.floor(W*s)+'px';
  cv.style.height = Math.floor(H*s)+'px';
}
addEventListener('resize', fit);
addEventListener('orientationchange', ()=>setTimeout(fit,150));

/* ---------------- touch controls ---------------- */
const elPad = document.getElementById('pad');
const elStick = document.getElementById('padStick');
const elJump = document.getElementById('btnJump');
const elFire = document.getElementById('btnFire');
let padTouchId = null;

function enableTouchUI(){
  if(document.body.classList.contains('touch')) return;
  document.body.classList.add('touch'); fit();
}
if(('ontouchstart' in window) || navigator.maxTouchPoints > 0 ||
   matchMedia('(pointer:coarse)').matches) enableTouchUI();

function padDirFromTouch(t){
  const r = elPad.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  let dx = t.clientX - cx, dy = t.clientY - cy;
  const dist = Math.hypot(dx,dy), dead = r.width*0.14, max = r.width*0.42;
  // move the visual stick
  const cl = Math.min(dist, max);
  const ux = dist? dx/dist : 0, uy = dist? dy/dist : 0;
  elStick.style.transform = `translate(${ux*cl}px,${uy*cl}px)`;
  keys.L = keys.R = keys.U = keys.D = false;
  if(dist < dead) return;
  const a = Math.atan2(dy,dx); // 8-way sectors
  const oct = Math.round(a / (Math.PI/4));
  if(oct===0){ keys.R=true; }
  else if(oct===1){ keys.R=true; keys.D=true; }
  else if(oct===2){ keys.D=true; }
  else if(oct===3){ keys.L=true; keys.D=true; }
  else if(oct===4 || oct===-4){ keys.L=true; }
  else if(oct===-3){ keys.L=true; keys.U=true; }
  else if(oct===-2){ keys.U=true; }
  else if(oct===-1){ keys.R=true; keys.U=true; }
}
function padRelease(){
  padTouchId = null;
  keys.L = keys.R = keys.U = keys.D = false;
  elStick.style.transform = 'translate(0,0)';
}
elPad.addEventListener('touchstart', e=>{
  e.preventDefault(); ac(); enableTouchUI();
  const t = e.changedTouches[0];
  padTouchId = t.identifier; padDirFromTouch(t);
},{passive:false});
elPad.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches) if(t.identifier===padTouchId) padDirFromTouch(t);
},{passive:false});
elPad.addEventListener('touchend', e=>{
  e.preventDefault();
  for(const t of e.changedTouches) if(t.identifier===padTouchId) padRelease();
},{passive:false});
elPad.addEventListener('touchcancel', padRelease);

function bindButton(el, key){
  el.addEventListener('touchstart', e=>{
    e.preventDefault(); ac(); enableTouchUI();
    el.classList.add('on');
    if(!keys[key]) keys[key+'_p'] = true;
    keys[key] = true;
    if(state!=='play') keys.GO_p = true; // any button starts/restarts
  },{passive:false});
  const off = e=>{ e.preventDefault(); el.classList.remove('on'); keys[key]=false; };
  el.addEventListener('touchend', off, {passive:false});
  el.addEventListener('touchcancel', off, {passive:false});
}
bindButton(elJump, 'J');
bindButton(elFire, 'F');

// tap the screen itself to start / restart
cv.addEventListener('touchstart', e=>{
  e.preventDefault(); ac(); enableTouchUI();
  if(state!=='play') keys.GO_p = true;
},{passive:false});

/* ---------------- level geometry ---------------- */
// Solid ground blocks (full solid). Gaps between them are pits.
const grounds = [
  {x:0,    w:1180}, {x:1300, w:930}, {x:2350, w:790},
  {x:3260, w:650},  {x:4030, w:1070},{x:5220, w:1680} // boss arena ground
].map(g=>({x:g.x, y:GROUND_Y, w:g.w, h:H-GROUND_Y}));

// Jump-through floating platforms {x,y,w}
const plats = [
  {x:420,y:350,w:150},{x:700,y:280,w:130},{x:1180,y:330,w:160},
  {x:1500,y:360,w:140},{x:1780,y:280,w:150},{x:2240,y:330,w:150},
  {x:2560,y:350,w:140},{x:2840,y:270,w:150},{x:3140,y:340,w:160},
  {x:3520,y:350,w:140},{x:3800,y:300,w:170},{x:4220,y:350,w:150},
  {x:4520,y:280,w:150},{x:4820,y:350,w:150},{x:5080,y:340,w:150},{x:5350,y:330,w:150}
].map(p=>({x:p.x,y:p.y,w:p.w,h:14}));

const CHECKPOINTS = [80, 1400, 2450, 3350, 4150, 5320];
const BOSS_TRIGGER_X = 5700;
const BOSS_X = 6450;

/* ---------------- entity factories ---------------- */
function mkSoldier(x,y,patrol){
  return {kind:'soldier',x,y:y-44,w:26,h:44,vx:0,vy:0,hp:1,dir:-1,
    patrol:patrol||0, px0:x, t:Math.floor(Math.random()*90), dead:false, score:100};
}
function mkTurret(x,y){
  return {kind:'turret',x,y:y-30,w:38,h:30,hp:3,t:0,burst:0,ang:Math.PI,dead:false,score:300,flash:0};
}
function mkSpawner(x,y){
  return {kind:'spawner',x,y:y-52,w:44,h:52,hp:6,t:0,dead:false,score:500,flash:0,dropSure:true};
}
function mkBoss(){
  return {kind:'boss',x:BOSS_X,y:GROUND_Y-150,w:120,h:150,hp:64,maxhp:64,
    t:0,phase:'enter',pt:0,vx:0,vy:0,baseY:GROUND_Y-150,dead:false,flash:0,score:5000,active:false};
}

let player, cam, enemies, bullets, ebullets, pickups, parts, boss;
let score, lives, hiscore = 0, state, stateT, weapon, msg, msgT, shake;

function levelEnemies(){
  return [
    mkSoldier(620, GROUND_Y, 70),
    mkSoldier(900, GROUND_Y, 0),
    mkTurret(1080, GROUND_Y),
    mkSoldier(1480, GROUND_Y, 60),
    mkSpawner(1700, GROUND_Y),
    mkSoldier(1950, GROUND_Y, 80),
    mkTurret(2160, GROUND_Y),
    mkSoldier(2520, GROUND_Y, 60),
    mkSoldier(2760, GROUND_Y, 0),
    mkSpawner(2980, GROUND_Y),
    mkTurret(3060, GROUND_Y),
    mkSoldier(3440, GROUND_Y, 60),
    mkTurret(3760, GROUND_Y),
    mkSoldier(4200, GROUND_Y, 80),
    mkSpawner(4420, GROUND_Y),
    mkSoldier(4650, GROUND_Y, 0),
    mkTurret(4880, GROUND_Y),
    mkSoldier(5000, GROUND_Y, 70),
    mkSoldier(5450, GROUND_Y, 80),
    mkTurret(5600, GROUND_Y)
  ];
}

function safeGroundX(x){
  // snap x onto solid ground (nudge right to the next ground if over a pit)
  for(const g of grounds) if(x >= g.x && x <= g.x+g.w-40) return x;
  let best = x;
  for(const g of grounds) if(g.x >= x){ best = g.x+30; break; }
  return best;
}
function resetPlayer(x){
  x = safeGroundX(x);
  player = {x:x, y:GROUND_Y-48, w:24, h:48, vx:0, vy:0, onGround:false,
    face:1, crouch:false, inv:140, fireCd:0, dead:false, deadT:0, runT:0};
}
function newGame(){
  score = 0; lives = 3; weapon = 'N';
  enemies = levelEnemies(); bullets=[]; ebullets=[]; pickups=[]; parts=[];
  boss = mkBoss(); enemies.push(boss);
  cam = 0; shake = 0; msg=''; msgT=0;
  resetPlayer(80);
  state = 'play'; stateT = 0;
}

/* ---------------- helpers ---------------- */
function rects(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
function onScreen(e,m){ m=m||80; return e.x+e.w > cam-m && e.x < cam+W+m; }
function explode(x,y,n,col){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, s = 1+Math.random()*4;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,t:20+Math.random()*20,col:col||'#ffb030'});
  }
}
function dropPickup(x,y,sure){
  if(!sure && Math.random() > 0.13) return;
  const types = ['S','R','L'];
  const t = types[Math.floor(Math.random()*types.length)];
  pickups.push({x:x-10,y:y-10,w:20,h:20,vy:-4,type:t,t:0});
}
function aimDir(){
  // returns {dx,dy} normalized-ish 8-way aim
  let dx = 0, dy = 0;
  if(keys.U) dy = -1;
  if(keys.D && !player.onGround) dy = 1;        // aim down only in air
  if(keys.L) dx = -1; else if(keys.R) dx = 1;
  if(dx===0 && dy===0) dx = player.face;
  if(dx!==0) player.face = dx;
  const m = Math.hypot(dx,dy)||1;
  return {dx:dx/m, dy:dy/m};
}
function fireWeapon(){
  const a = aimDir();
  const muzzleY = player.crouch ? player.y+player.h-18 : player.y+16;
  const mx = player.x+player.w/2 + a.dx*18, my = muzzleY + a.dy*14;
  const sp = 11;
  if(weapon==='N'){
    bullets.push({x:mx,y:my,vx:a.dx*sp,vy:a.dy*sp,w:8,h:8,pierce:false});
    player.fireCd = 14; SFX.shoot();
  } else if(weapon==='R'){
    bullets.push({x:mx,y:my,vx:a.dx*(sp+2),vy:a.dy*(sp+2),w:8,h:8,pierce:false});
    player.fireCd = 5; SFX.shoot();
  } else if(weapon==='S'){
    const base = Math.atan2(a.dy,a.dx);
    for(let i=-2;i<=2;i++){
      const an = base + i*0.16;
      bullets.push({x:mx,y:my,vx:Math.cos(an)*sp,vy:Math.sin(an)*sp,w:8,h:8,pierce:false});
    }
    player.fireCd = 18; SFX.spread();
  } else if(weapon==='L'){
    bullets.push({x:mx,y:my,vx:a.dx*18,vy:a.dy*18,w:14,h:6,pierce:true,laser:true,
      ang:Math.atan2(a.dy,a.dx)});
    player.fireCd = 12; SFX.laser();
  }
}
function killPlayer(){
  if(player.inv>0 || player.dead) return;
  player.dead = true; player.deadT = 0;
  weapon = 'N';
  explode(player.x+12, player.y+24, 26, '#ff5040');
  SFX.die(); shake = 14;
}

/* ---------------- update ---------------- */
function updatePlay(){
  stateT++;

  /* ----- player ----- */
  const p = player;
  if(p.dead){
    p.deadT++;
    if(p.deadT === 70){
      lives--;
      if(lives < 0){ state='over'; stateT=0; hiscore=Math.max(hiscore,score); SFX.over(); }
      else {
        let cp = CHECKPOINTS[0];
        for(const c of CHECKPOINTS) if(c <= p.x+40) cp = c;
        if(boss.active && !boss.dead) cp = CHECKPOINTS[CHECKPOINTS.length-1];
        resetPlayer(Math.max(cp, cam+60)); // camera never scrolls back
      }
    }
  } else {
    p.crouch = p.onGround && keys.D;
    const spd = 3.4;
    p.vx = 0;
    if(!p.crouch){
      if(keys.L) { p.vx = -spd; p.face=-1; }
      if(keys.R) { p.vx =  spd; p.face= 1; }
    }
    if((keys.J_p || keys.U_p) && p.onGround){ p.vy = -13; p.onGround=false; SFX.jump(); }
    p.vy += GRAV; if(p.vy>14) p.vy=14;

    // horizontal
    p.x += p.vx;
    if(p.x < cam-4) p.x = cam-4;
    if(p.x > LEVEL_W-30) p.x = LEVEL_W-30;
    for(const g of grounds){
      if(rects(p,g)){
        if(p.vx>0) p.x = g.x - p.w; else if(p.vx<0) p.x = g.x+g.w;
      }
    }
    // vertical
    const wasFalling = p.vy >= 0, prevBottom = p.y+p.h;
    p.y += p.vy; p.onGround = false;
    const hb = p.crouch ? 26 : 48;
    p.h = hb; if(p.crouch) p.y = Math.min(p.y, GROUND_Y-26);
    for(const g of grounds){
      if(rects(p,g)){
        if(p.vy>0 && prevBottom <= g.y+10){ p.y = g.y-p.h; p.vy=0; p.onGround=true; }
        else if(p.vy<0){ p.y = g.y+g.h; p.vy=0; }
      }
    }
    if(wasFalling) for(const pl of plats){
      if(rects(p,pl) && prevBottom <= pl.y+8 && !(keys.D && keys.J_p)){
        p.y = pl.y-p.h; p.vy=0; p.onGround=true;
      }
    }
    // pit death — bypasses invincibility, you fell in a hole
    if(p.y > H+40 && !p.dead){ p.inv = 0; killPlayer(); p.deadT = 30; }

    // shooting
    if(p.fireCd>0) p.fireCd--;
    if(keys.F && p.fireCd<=0) fireWeapon();
    if(p.inv>0) p.inv--;
    if(Math.abs(p.vx)>0 && p.onGround) p.runT++;
  }

  /* ----- camera ----- */
  let targ = p.x - W*0.38;
  const camMax = boss.active ? LEVEL_W - W : LEVEL_W - W;
  cam = Math.max(cam, Math.min(Math.max(0,targ), camMax)); // never scroll back
  if(boss.active) cam = LEVEL_W - W;

  // boss trigger
  if(!boss.active && p.x > BOSS_TRIGGER_X){
    boss.active = true; msg='!! WARLORD MECHA !!'; msgT=150;
  }

  /* ----- player bullets ----- */
  for(const b of bullets){
    b.x += b.vx; b.y += b.vy;
  }
  bullets = bullets.filter(b=> b.x>cam-40 && b.x<cam+W+40 && b.y>-40 && b.y<H+40 && !b.hit);

  /* ----- enemies ----- */
  for(const e of enemies){
    if(e.dead || !onScreen(e,140)) continue;
    if(e.flash>0) e.flash--;
    if(e.kind==='soldier'){
      e.t++;
      if(e.patrol>0 && !p.dead){
        e.x += e.dir*0.8;
        if(Math.abs(e.x-e.px0) > e.patrol) e.dir*=-1;
      }
      const face = (p.x > e.x) ? 1 : -1; e.face = face;
      if(e.t % 110 === 0 && !p.dead && Math.abs(p.x-e.x) < 520){
        const dy = (p.y+p.h/2) - (e.y+14);
        const dx = (p.x+12) - (e.x+13);
        const m = Math.hypot(dx,dy)||1;
        ebullets.push({x:e.x+13+face*14, y:e.y+14, vx:dx/m*4.6, vy:dy/m*4.6, w:7,h:7});
        SFX.eshoot();
      }
    } else if(e.kind==='turret'){
      e.t++;
      e.ang = Math.atan2((p.y+p.h/2)-(e.y+8), (p.x+12)-(e.x+19));
      if(!p.dead && e.t % 130 < 30 && e.t % 10 === 0 && Math.abs(p.x-e.x)<560){
        ebullets.push({x:e.x+19+Math.cos(e.ang)*24, y:e.y+8+Math.sin(e.ang)*24,
          vx:Math.cos(e.ang)*5.2, vy:Math.sin(e.ang)*5.2, w:7,h:7});
        SFX.eshoot();
      }
    } else if(e.kind==='spawner'){
      e.t++;
      if(e.t % 200 === 0 && enemies.filter(s=>s.kind==='soldier'&&!s.dead&&Math.abs(s.x-e.x)<400).length < 3){
        const s = mkSoldier(e.x+e.w/2, GROUND_Y, 50);
        s.x = e.x + (p.x<e.x?-30:e.w+6);
        enemies.push(s);
        explode(e.x+e.w/2, e.y+10, 6, '#9aff60');
      }
    } else if(e.kind==='boss' && e.active){
      updateBoss(e);
    }
  }

  /* ----- enemy bullets ----- */
  for(const b of ebullets){ b.x+=b.vx; b.y+=b.vy; if(b.grav) b.vy+=0.18; }
  ebullets = ebullets.filter(b=> b.x>cam-40 && b.x<cam+W+40 && b.y>-60 && b.y<H+40);

  /* ----- collisions: player bullets vs enemies ----- */
  for(const b of bullets){
    for(const e of enemies){
      if(e.dead || (e.kind==='boss' && !e.active)) continue;
      if(rects(b,e)){
        if(!b.pierce) b.hit = true;
        e.hp -= b.laser ? 2 : 1; e.flash = 6;
        if(e.kind==='boss') SFX.hitB(); 
        explode(b.x, b.y, 4, '#ffe080');
        if(e.hp <= 0 && !e.dead){
          e.dead = true; score += e.score;
          explode(e.x+e.w/2, e.y+e.h/2, e.kind==='boss'?60:18);
          if(e.kind==='boss'){ SFX.bigboom(); shake=20; state='victory'; stateT=0; hiscore=Math.max(hiscore,score); SFX.win(); }
          else SFX.boom();
          if(e.kind==='spawner') dropPickup(e.x+e.w/2, e.y, true);
          else if(e.kind!=='boss') dropPickup(e.x+e.w/2, e.y, false);
        }
        if(!b.pierce) break;
      }
    }
  }
  bullets = bullets.filter(b=>!b.hit);

  /* ----- collisions: hazards vs player ----- */
  if(!p.dead && p.inv<=0){
    for(const b of ebullets){
      if(rects(b,p)){ b.x = -9999; killPlayer(); break; }
    }
    for(const e of enemies){
      if(!e.dead && (e.kind!=='boss'||e.active) && rects(e,p)){ killPlayer(); break; }
    }
  }

  /* ----- pickups ----- */
  for(const pk of pickups){
    pk.t++; pk.vy += 0.3; pk.y += pk.vy;
    for(const g of grounds) if(rects(pk,g) && pk.vy>0){ pk.y=g.y-pk.h; pk.vy=0; }
    if(!p.dead && rects(pk,p)){
      weapon = pk.type; pk.got = true; score += 200; SFX.power();
      msg = pk.type==='S'?'SPREAD SHOT!':pk.type==='R'?'RAPID FIRE!':'LASER!'; msgT=90;
    }
  }
  pickups = pickups.filter(pk=>!pk.got && pk.y<H+60);

  /* ----- particles ----- */
  for(const q of parts){ q.x+=q.vx; q.y+=q.vy; q.vy+=0.18; q.t--; }
  parts = parts.filter(q=>q.t>0);

  if(msgT>0) msgT--;
  if(shake>0) shake--;
}

function updateBoss(b){
  b.pt++;
  const p = player;
  if(b.phase==='enter'){
    b.y = Math.min(b.baseY, b.y+0); // already placed
    if(b.pt>60){ b.phase='aim'; b.pt=0; }
  } else if(b.phase==='aim'){
    // hover slightly, fire aimed 3-round bursts
    b.y = b.baseY + Math.sin(b.pt*0.05)*8;
    if(b.pt % 55 === 0 && !p.dead){
      for(let i=0;i<3;i++){
        setTimeout(()=>{
          if(state!=='play'||b.dead) return;
          const dx=(p.x+12)-(b.x+20), dy=(p.y+20)-(b.y+60), m=Math.hypot(dx,dy)||1;
          ebullets.push({x:b.x+20,y:b.y+60,vx:dx/m*5.6,vy:dy/m*5.6,w:9,h:9});
          SFX.eshoot();
        }, i*120);
      }
    }
    if(b.pt>240){ b.phase='rain'; b.pt=0; }
  } else if(b.phase==='rain'){
    // mortar rain across the arena
    if(b.pt % 16 === 0){
      const tx = cam + 60 + Math.random()*(W-200);
      ebullets.push({x:tx, y:-20, vx:(Math.random()-0.5)*1.2, vy:2.5, w:9,h:9, grav:true});
      if(b.pt%32===0) SFX.eshoot();
    }
    if(b.pt>200){ b.phase = (b.hp < b.maxhp*0.55) ? 'charge' : 'aim'; b.pt=0; }
  } else if(b.phase==='charge'){
    // lunge toward player then return — enraged pattern
    if(b.pt<40){ b.flashWarn = true; }
    else if(b.pt<90){ b.flashWarn=false; b.x -= 7; }
    else if(b.pt<150){ b.x += 4.7; if(b.x>BOSS_X) b.x=BOSS_X; }
    else { b.x = BOSS_X; b.phase='aim'; b.pt=0; }
  }
}

/* ---------------- drawing ---------------- */
function R(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }

function drawBG(){
  // sky gradient bands (dusk jungle)
  const bands = ['#1a2e12','#203a16','#27451a','#2e511f'];
  for(let i=0;i<4;i++) R(0, i*70, W, 70, bands[i]);
  R(0,280,W,H-280,'#335c23');
  // sun
  R(720,60,70,70,'#ffd98a'); R(735,45,40,12,'#ffd98a'); R(735,133,40,12,'#ffd98a');
  // far ridge (parallax .2)
  ctx.save(); ctx.translate(-cam*0.2,0);
  for(let x=-200;x<LEVEL_W*0.2+W+400;x+=260){
    R(x,250,260,160,'#14260e');
    R(x+40,210,120,60,'#14260e');
  }
  ctx.restore();
  // mid trees (parallax .5)
  ctx.save(); ctx.translate(-cam*0.5,0);
  for(let x=-100;x<LEVEL_W*0.5+W+300;x+=210){
    R(x+90,300,22,140,'#1d1408');                 // trunk
    R(x+40,240,122,70,'#0f3a14');                  // canopy
    R(x+62,210,80,40,'#0f3a14');
    R(x+30,300,140,26,'#0c2e10');
  }
  ctx.restore();
}

function drawWorld(){
  // grounds
  for(const g of grounds){
    if(g.x+g.w<cam-50||g.x>cam+W+50) continue;
    R(g.x,g.y,g.w,6,'#7ddc55');           // grass lip
    R(g.x,g.y+6,g.w,12,'#3f8f2e');
    R(g.x,g.y+18,g.w,g.h-18,'#4a2f17');   // dirt
    ctx.fillStyle='#3a2310';
    for(let x=g.x;x<g.x+g.w;x+=48) for(let y=g.y+26;y<H;y+=34)
      ctx.fillRect(x+((y/34|0)%2)*24, y, 20, 10);
  }
  // pits glow (subtle hazard hint)
  // floating platforms
  for(const pl of plats){
    if(pl.x+pl.w<cam||pl.x>cam+W) continue;
    R(pl.x,pl.y,pl.w,4,'#9be36b');
    R(pl.x,pl.y+4,pl.w,6,'#4f7a2c');
    R(pl.x,pl.y+10,pl.w,4,'#33511c');
    R(pl.x+4,pl.y+14,4,8,'#2a3d16'); R(pl.x+pl.w-8,pl.y+14,4,8,'#2a3d16');
  }
}

function drawPlayer(){
  const p = player;
  if(p.dead){
    if(p.deadT<40){ // flung corpse flicker
      const dy = p.deadT*1.2;
      R(p.x, p.y - dy*0.2, 24, 10, '#cf3a2a');
    }
    return;
  }
  if(p.inv>0 && (p.inv>>2)%2===0) return; // blink
  const x=p.x, y=p.y, f=p.face;
  if(p.crouch){
    R(x+2,y+2,20,10,'#3e5d2a');            // pack/back
    R(x+6,y-8,12,10,'#e0a878');            // head
    R(x+4,y-12,16,6,'#2f4a20');            // helmet
    R(x+2,y+12,20,8,'#33491f');            // legs folded
    R(x+(f>0?14:-8),y+4,18,5,'#888');      // rifle
    R(x+(f>0?28:-12),y+4,4,5,'#bbb');
  } else {
    const run = p.onGround && Math.abs(p.vx)>0 ? Math.floor(p.runT/6)%2 : 0;
    R(x+6,y,12,10,'#e0a878');              // head
    R(x+4,y-4,16,6,'#2f4a20');             // helmet
    R(x+4,y+10,16,18,'#3e5d2a');           // torso
    R(x+4,y+14,16,4,'#27381a');            // belt strap
    // legs
    if(run===0){ R(x+4,y+28,7,20,'#33491f'); R(x+13,y+28,7,20,'#33491f'); }
    else { R(x+2,y+28,7,18,'#33491f'); R(x+15,y+30,7,18,'#33491f'); }
    R(x+4,y+44,8,4,'#1c130a'); R(x+12,y+44,8,4,'#1c130a'); // boots
    // arms + rifle along aim
    const a = (state==='play') ? currentAimForDraw() : {dx:f,dy:0};
    const gx = x+12, gy = y+16;
    R(gx-2,gy-2,4,10,'#2f4a20');
    R(gx + a.dx*8 - 9, gy + a.dy*8 - 2, 18, 5, '#888');
    R(gx + a.dx*16 - 2, gy + a.dy*16 - 2, 5, 5, '#bbb');
  }
}
function currentAimForDraw(){
  let dx=0,dy=0;
  if(keys.U) dy=-1;
  if(keys.D && !player.onGround) dy=1;
  if(keys.L) dx=-1; else if(keys.R) dx=1;
  if(dx===0&&dy===0) dx=player.face;
  const m=Math.hypot(dx,dy)||1; return {dx:dx/m,dy:dy/m};
}

function drawEnemies(){
  for(const e of enemies){
    if(e.dead || !onScreen(e)) continue;
    const fl = e.flash>0;
    if(e.kind==='soldier'){
      const x=e.x,y=e.y,f=e.face||(-1);
      R(x+7,y,12,10, fl?'#fff':'#d8b08c');
      R(x+5,y-4,16,6, fl?'#fff':'#5a2630');           // dark red beret
      R(x+5,y+10,16,18, fl?'#fff':'#46527a');          // blue-gray uniform
      const run = Math.floor(e.t/8)%2;
      R(x+5+(run?2:0),y+28,7,16,'#2c3450'); R(x+14-(run?2:0),y+28,7,16,'#2c3450');
      R(x+13+f*4,y+16,14,4,'#777');                   // rifle
    } else if(e.kind==='turret'){
      const x=e.x,y=e.y;
      R(x,y+18,38,12, fl?'#fff':'#444');               // base
      R(x+4,y+8,30,12, fl?'#fff':'#5c5c66');           // dome
      R(x+14,y+2,10,8, fl?'#fff':'#6e6e7a');
      ctx.save(); ctx.translate(x+19,y+8); ctx.rotate(e.ang);
      R(0,-3,26,6,'#2b2b30'); R(22,-4,6,8,'#8a8a96');
      ctx.restore();
      R(x+16,y+12,6,4,'#ff5040');                      // eye
    } else if(e.kind==='spawner'){
      const x=e.x,y=e.y;
      R(x,y,44,52, fl?'#fff':'#54483a');
      R(x+4,y+4,36,44,'#6b5c48');
      for(let i=0;i<4;i++) R(x+4+i*10, y+4, 6, 44, i%2?'#7a6a52':'#403628'); // hazard stripes
      R(x+14,y+18,16,16, ((e.t>>4)%2)?'#9aff60':'#3f7a26');  // pulsing core
      R(x-2,y+48,48,6,'#2e2820');
      // hp pips
      for(let i=0;i<e.hp;i++) R(x+4+i*7, y-8, 5, 4, '#9aff60');
    } else if(e.kind==='boss' && e.active){
      drawBoss(e);
    }
  }
}

function drawBoss(b){
  const x=b.x, y=b.y, fl=b.flash>0;
  const warn = b.flashWarn && (b.pt>>2)%2===0;
  const body = fl?'#fff': warn?'#a23434':'#5a3a4a';
  // legs
  R(x+8,y+110,26,40, '#3a2630'); R(x+86,y+110,26,40, '#3a2630');
  R(x+2,y+146,38,8,'#241820'); R(x+80,y+146,38,8,'#241820');
  // torso
  R(x,y+40,120,76, body);
  R(x+8,y+48,104,60, fl?'#fff':'#6d4a5c');
  // head
  R(x+30,y,60,44, body);
  R(x+38,y+10,44,18, fl?'#fff':'#241820');
  R(x+42,y+14,12,8,'#ff5040'); R(x+62,y+14,12,8,'#ff5040');  // eyes
  // cannon arm (left, toward player)
  R(x-22,y+52,30,16,'#2b2b30'); R(x-30,y+50,10,20,'#8a8a96');
  // vents
  for(let i=0;i<5;i++) R(x+16+i*18, y+92, 10, 14, ((b.t+i*3)>>3)%2?'#ffae40':'#7a3420');
  b.t++;
}

function drawBulletsAndStuff(){
  for(const b of bullets){
    if(b.laser){
      ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.ang);
      R(-16,-2,32,4,'#8af0ff'); R(-10,-3,20,6,'#d8fbff');
      ctx.restore();
    } else {
      R(b.x-4,b.y-4,8,8,'#ffe080'); R(b.x-2,b.y-2,4,4,'#fff');
    }
  }
  for(const b of ebullets){
    R(b.x-4,b.y-4,9,9,'#ff5040'); R(b.x-2,b.y-2,4,4,'#ffd0a0');
  }
  for(const pk of pickups){
    const pulse = (pk.t>>3)%2;
    R(pk.x-2,pk.y-2,24,24, pulse?'#ffd98a':'#caa040');
    R(pk.x,pk.y,20,20,'#1c2a14');
    ctx.fillStyle = pk.type==='S'?'#9aff60':pk.type==='R'?'#ffae40':'#8af0ff';
    ctx.font = 'bold 14px monospace'; ctx.textAlign='center';
    ctx.fillText(pk.type, pk.x+10, pk.y+15);
  }
  for(const q of parts){
    R(q.x-2,q.y-2,4,4,q.col);
  }
}

function drawHUD(){
  ctx.textAlign='left';
  ctx.font='bold 16px monospace';
  ctx.fillStyle='#0008'; ctx.fillRect(0,0,W,34);
  ctx.fillStyle='#e8ffe0';
  ctx.fillText('SCORE '+String(score).padStart(7,'0'), 14, 23);
  // lives
  ctx.fillText('LIVES', 250, 23);
  for(let i=0;i<Math.max(0,lives);i++){
    R(320+i*22, 8, 8, 8, '#e0a878'); R(318+i*22, 16, 12, 10, '#3e5d2a');
  }
  // weapon
  const wn = {N:'STANDARD',S:'SPREAD',R:'RAPID',L:'LASER'}[weapon];
  ctx.fillStyle='#9aff60';
  ctx.fillText('WPN: '+wn, 440, 23);
  ctx.fillStyle='#e8ffe0';
  ctx.fillText('HI '+String(Math.max(hiscore,score)).padStart(7,'0'), 790, 23);
  // boss health
  if(boss.active && !boss.dead && state==='play'){
    const bw = 420, pct = Math.max(0, boss.hp/boss.maxhp);
    R(W/2-bw/2-3, 46, bw+6, 18, '#000a');
    R(W/2-bw/2, 49, bw, 12, '#3a1420');
    R(W/2-bw/2, 49, bw*pct, 12, pct>0.4?'#ff5040':'#ffae40');
    ctx.fillStyle='#ffd0a0'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
    ctx.fillText('WARLORD MECHA', W/2, 78);
  }
  if(msgT>0){
    ctx.textAlign='center'; ctx.font='bold 22px monospace';
    ctx.fillStyle = (msgT>>2)%2 ? '#ffd98a' : '#9aff60';
    ctx.fillText(msg, W/2, 130);
  }
}

function drawScreenText(big, sub, sub2){
  ctx.fillStyle='#000a'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 52px monospace'; ctx.fillStyle='#9aff60';
  ctx.fillText(big, W/2, 220);
  ctx.font='bold 20px monospace'; ctx.fillStyle='#e8ffe0';
  if(sub) ctx.fillText(sub, W/2, 280);
  if(sub2 && (stateT>>4)%2) ctx.fillText(sub2, W/2, 340);
}

function startPrompt(){ return document.body.classList.contains('touch') ? 'TAP TO START' : 'PRESS ENTER'; }

function drawTitle(){
  drawBG();
  cam = (stateT*0.6)%2000;
  drawWorld();
  ctx.fillStyle='#000a'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 56px monospace';
  ctx.fillStyle='#1c2a14'; ctx.fillText('JUNGLE STRIKE',W/2+4,184);
  ctx.fillStyle='#9aff60'; ctx.fillText('JUNGLE STRIKE',W/2,180);
  ctx.fillStyle='#ffd98a'; ctx.font='bold 40px monospace';
  ctx.fillText('COMMANDO',W/2,232);
  ctx.font='15px monospace'; ctx.fillStyle='#cfe8c0';
  if(document.body.classList.contains('touch')){
    ctx.fillText('LEFT STICK: move & aim 8 ways · JUMP and FIRE buttons on the right', W/2, 320);
  } else {
    ctx.fillText('ARROWS: move & aim 8 ways   Z/UP: jump   X: fire   DOWN: crouch', W/2, 320);
  }
  ctx.fillText('Destroy spawners for weapon drops · One hit = one life · Beat the Warlord', W/2, 348);
  if((stateT>>4)%2){ ctx.font='bold 24px monospace'; ctx.fillStyle='#fff';
    ctx.fillText(startPrompt(), W/2, 420); }
  if(hiscore>0){ ctx.font='14px monospace'; ctx.fillStyle='#9aff60';
    ctx.fillText('HI-SCORE '+hiscore, W/2, 470); }
}

/* ---------------- main loop ---------------- */
function frame(){
  if(state==='title'){
    stateT++;
    if(keys.GO_p) newGame();
    drawTitle();
  }
  else if(state==='play'){
    updatePlay();
    render();
  }
  else if(state==='over' || state==='victory'){
    stateT++;
    render();
    if(state==='over') drawScreenText('GAME OVER','FINAL SCORE  '+score, startPrompt()+' TO RETRY');
    else drawScreenText('MISSION COMPLETE','WARLORD DESTROYED · SCORE '+score, startPrompt()+' TO PLAY AGAIN');
    if(stateT>40 && keys.GO_p){ state='title'; stateT=0; }
  }
  clearPresses();
  requestAnimationFrame(frame);
}
function render(){
  ctx.save();
  if(shake>0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
  drawBG();
  ctx.save(); ctx.translate(-cam,0);
  drawWorld();
  drawEnemies();
  drawPlayer();
  drawBulletsAndStuff();
  ctx.restore();
  drawHUD();
  ctx.restore();
}

state='title'; stateT=0; score=0; lives=3; weapon='N';
boss = mkBoss(); enemies=[]; bullets=[]; ebullets=[]; pickups=[]; parts=[]; cam=0; shake=0; msg=''; msgT=0;
resetPlayer(80);
fit();
frame();
</script>
